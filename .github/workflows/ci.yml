name: CI
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0-23/3 * * *"

jobs:
  check:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for new patches
        id: check_patches
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh api repos/MorpheApp/morphe-patches/releases --jq 'sort_by(.created_at) | reverse | .[0].tag_name')
          echo "Latest patches: $LATEST"
          LAST=""
          if git checkout origin/update build.md 2>/dev/null; then
            LAST=$(grep -oP 'Patches: MorpheApp/patches-\K.*?(?=\.mpp)' build.md | head -1)
            if [ -n "$LAST" ]; then
              [[ $LAST != v* ]] && LAST="v$LAST"
              echo "Last built: $LAST"
            fi
          fi
          if [ -z "$LAST" ] || [ "$LATEST" != "$LAST" ]; then
            echo "SHOULD_BUILD=1" >> $GITHUB_OUTPUT
          else
            echo "SHOULD_BUILD=0" >> $GITHUB_OUTPUT
          fi

      - name: Check config changes
        id: should_build
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PATCHES_BUILD="${{ steps.check_patches.outputs.SHOULD_BUILD }}"
          
          if [ "$PATCHES_BUILD" = "1" ]; then
            echo "SHOULD_BUILD=1" >> $GITHUB_OUTPUT
          elif git checkout origin/update build.md 2>/dev/null; then
            UPDATE_CFG=$(./build.sh config.toml --config-update)
            if [ -n "$UPDATE_CFG" ]; then
              echo "SHOULD_BUILD=1" >> $GITHUB_OUTPUT
            else
              echo "SHOULD_BUILD=0" >> $GITHUB_OUTPUT
            fi
          else
            echo "SHOULD_BUILD=1" >> $GITHUB_OUTPUT
          fi

      - name: Clear older runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run list -L400 --json databaseId -q '.[].databaseId' | tail -n+10 | xargs -IID gh api "repos/$GITHUB_REPOSITORY/actions/runs/ID" -X DELETE || :

      - name: Notify Telegram on CI Failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          WORKFLOW_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

          MSG="❌ *Morphe CI Check Failed!*

          *Repo:* \`$GITHUB_REPOSITORY\`
          *Triggered by:* \`$GITHUB_ACTOR\`

          [View Failed Run](${WORKFLOW_URL})"

          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"$TG_CHAT_ID\",
              \"text\": \"$MSG\",
              \"parse_mode\": \"Markdown\",
              \"disable_web_page_preview\": true
            }"

    outputs:
      SHOULD_BUILD: ${{ steps.should_build.outputs.SHOULD_BUILD }}

  build:
    permissions: write-all
    needs: check
    uses: ./.github/workflows/build.yml
    if: ${{ needs.check.outputs.SHOULD_BUILD == 1 }}
    secrets: inherit
